# Large Conformer-CTC configuration (~30M parameters)
# For broader vocabulary coverage on general conversational English (P25 radio)

model:
  input_dim: 170
  d_model: 512
  n_heads: 8
  d_ff: 2048
  n_layers: 8
  conv_kernel: 31
  vocab_size: 40
  dropout: 0.1
  subsample: false

training:
  epochs: 100
  batch_size: 32
  accum_steps: 4
  lr: 2e-4
  warmup_steps: 2000
  weight_decay: 0.01
  grad_clip: 5.0

data:
  pairs_dir: data/pairs
  librispeech_dir: data/LibriSpeech/train-clean-100
  val_fraction: 0.1
  min_frames: 10
  max_frames: 2000

# P25 radio is general conversational English, not just dispatch codes.
# Covers law enforcement, fire, EMS, public works, transit, schools,
# bus drivers, ODOT workers -- full breadth of everyday English.
# Need more model capacity than the 9.2M POC for this vocabulary.
